<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlantMD — Диагностика растений</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07110a;
      --bg-card:     rgba(255,255,255,0.04);
      --bg-card-h:   rgba(255,255,255,0.07);
      --green:       #4ade80;
      --green-dim:   #22c55e;
      --green-deep:  #166534;
      --green-glow:  rgba(74,222,128,0.12);
      --text:        #ecfdf5;
      --text-dim:    #86efac;
      --text-muted:  rgba(134,239,172,0.45);
      --border:      rgba(74,222,128,0.18);
      --radius:      16px;
      --radius-sm:   10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      overflow: hidden;
    }

    /* ─── Background canvas ─── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ─── Screens ─── */
    .screen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      opacity: 0; transform: translateY(28px);
      pointer-events: none;
      transition: opacity .45s ease, transform .45s ease;
      overflow-y: auto;
    }
    .screen.active  { opacity: 1; transform: translateY(0); pointer-events: all; }
    .screen.leaving { opacity: 0; transform: translateY(-20px); }

    /* ─── Language screen ─── */
    #screen-lang {
      align-items: center; justify-content: center;
      text-align: center; padding: 48px 24px; gap: 0;
    }

    .logo-wrap {
      width: 96px; height: 96px;
      border-radius: 28px;
      background: linear-gradient(145deg, #112318, #0a1a0f);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 0 80px rgba(74,222,128,0.1), inset 0 1px 0 rgba(74,222,128,0.08);
    }
    .logo-wrap svg { filter: drop-shadow(0 0 14px rgba(74,222,128,0.55)); }

    .app-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 56px; font-weight: 600;
      letter-spacing: -1.5px; line-height: 1;
    }
    .app-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 17px;
      color: var(--text-dim); margin: 6px 0 52px;
    }

    .lang-prompt {
      font-size: 11px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 18px;
    }

    .lang-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }

    .lang-btn {
      padding: 17px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 16px; font-weight: 500; letter-spacing: .04em;
      cursor: pointer; transition: all .28s ease;
      position: relative; overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .lang-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--green-glow), transparent);
      opacity: 0; transition: opacity .28s;
    }
    .lang-btn:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 8px 36px var(--green-glow); }
    .lang-btn:hover::after { opacity: 1; }
    .lang-btn .flag { font-size: 22px; }
    .lang-btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .key-wrap { width: 100%; }
    .key-wrap input {
      width: 100%; padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: 'Jost', sans-serif;
      font-size: 13px; font-weight: 300;
      outline: none; transition: border-color .22s, box-shadow .22s;
      letter-spacing: .03em;
    }
    .key-wrap input::placeholder { color: var(--text-muted); }
    .key-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }

    /* ─── AppBar ─── */
    .appbar {
      height: 62px; display: flex; align-items: center; padding: 0 18px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px); background: rgba(7,17,10,.82);
      flex-shrink: 0; position: sticky; top: 0; z-index: 10;
    }
    .ab-back {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border); background: none;
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .ab-back:hover { border-color: var(--green); color: var(--green); }
    .ab-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px; font-weight: 600;
      flex: 1; text-align: center;
    }
    .ab-spacer { width: 36px; }

    /* ─── Screen content ─── */
    .sc {
      flex: 1; padding: 24px 20px 32px;
      display: flex; flex-direction: column; gap: 22px;
      max-width: 560px; width: 100%; margin: 0 auto;
    }

    .sec-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
    }

    /* ─── Image grid ─── */
    .img-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .img-cell {
      aspect-ratio: 1; border-radius: var(--radius-sm);
      overflow: hidden; position: relative;
    }
    .img-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .img-del {
      position: absolute; top: 5px; right: 5px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,.6); border: none;
      color: #fff; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; line-height: 1;
    }
    .img-del:hover { background: rgba(220,38,38,.8); }

    .add-btn {
      aspect-ratio: 1; border-radius: var(--radius-sm);
      border: 1.5px dashed var(--border); background: var(--bg-card);
      color: var(--text-dim); cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      font-size: 10px; font-family: 'Jost', sans-serif;
      letter-spacing: .05em; transition: all .22s;
    }
    .add-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-glow); }
    .add-btn svg { width: 26px; height: 26px; }

    /* ─── Textarea ─── */
    textarea {
      width: 100%; min-height: 130px;
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 15px; color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 14px; font-weight: 300; line-height: 1.65;
      resize: vertical; outline: none;
      transition: border-color .22s, box-shadow .22s;
    }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }

    /* ─── Analyze button ─── */
    .analyze-btn {
      width: 100%; padding: 19px;
      border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, #166534, #15803d);
      color: var(--green);
      font-family: 'Jost', sans-serif;
      font-size: 14px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; transition: all .28s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 28px rgba(22,101,52,.4);
    }
    .analyze-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #15803d, #16a34a);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(22,101,52,.5);
    }
    .analyze-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .analyze-btn .bi { font-size: 18px; }

    /* ─── Loading overlay ─── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(7,17,10,.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      opacity: 0; pointer-events: none;
      transition: opacity .35s;
    }
    #loading.on { opacity: 1; pointer-events: all; }

    .spin-leaf {
      width: 72px; height: 72px;
      animation: spin 3s linear infinite;
      filter: drop-shadow(0 0 18px rgba(74,222,128,.45));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-txt {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; color: var(--text-dim);
    }
    .dots::after {
      content: ''; animation: dt 1.4s steps(1) infinite;
    }
    @keyframes dt {
      0%  { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      99% { content: '...'; }
    }

    /* ─── Result cards ─── */
    .r-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      backdrop-filter: blur(10px);
    }
    .r-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--green-dim); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .r-label::before {
      content: ''; display: block;
      width: 3px; height: 13px;
      background: var(--green); border-radius: 2px;
    }
    .r-text {
      font-size: 14px; font-weight: 300;
      line-height: 1.8; color: var(--text);
      white-space: pre-wrap;
    }
    .r-imgs {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 9px;
    }
    .r-imgs img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover; border-radius: var(--radius-sm);
    }

    /* ─── Snackbar ─── */
    #snack {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: #172c1e;
      border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 22px;
      font-size: 13px; color: var(--text);
      z-index: 200; transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      max-width: calc(100vw - 40px); text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #snack.show { transform: translateX(-50%) translateY(0); }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Loading -->
<div id="loading">
  <svg class="spin-leaf" viewBox="0 0 72 72" fill="none">
    <circle cx="36" cy="36" r="32" stroke="rgba(74,222,128,.12)" stroke-width="1.5"/>
    <path d="M36 4 A32 32 0 0 1 68 36" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <path d="M36 36 C36 18 50 12 62 16 C54 26 40 32 36 36Z" fill="rgba(74,222,128,.85)"/>
    <path d="M36 36 C36 54 24 60 14 57 C19 47 30 41 36 36Z" fill="rgba(74,222,128,.5)"/>
    <line x1="36" y1="36" x2="36" y2="66" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <p class="load-txt dots" id="load-msg">Анализирую</p>
</div>

<!-- Snackbar -->
<div id="snack"></div>

<!-- ══ SCREEN 1 — Language ══ -->
<div id="s-lang" class="screen active">
  <div class="logo-wrap">
    <svg width="54" height="54" viewBox="0 0 54 54" fill="none">
      <path d="M27 50C27 50 8 39 8 23C8 13.6 16.7 6 27 6C37.3 6 46 13.6 46 23C46 39 27 50 27 50Z"
        fill="rgba(74,222,128,.15)" stroke="#4ade80" stroke-width="1.4"/>
      <path d="M27 27C27 14 36 9 41 10.5C37 19 29 24 27 27Z" fill="#4ade80"/>
      <path d="M27 27C27 40 18 46 13 44.5C17 36 24 31 27 27Z" fill="rgba(74,222,128,.65)"/>
      <line x1="27" y1="27" x2="27" y2="48" stroke="#4ade80" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </div>
  <h1 class="app-name">PlantMD</h1>
  <p class="app-sub">by Sunnat</p>
  <p class="lang-prompt">Select language / Tilni tanlang</p>
  <div class="lang-btns">
    <div class="key-wrap">
      <input type="password" id="key-in" placeholder="Gemini API Key  AIzaSy..." autocomplete="off" oninput="onKeyInput(this.value)">
    </div>
    <button class="lang-btn" id="btn-ru" onclick="setLang('ru')" disabled>
      <span class="flag">🇷🇺</span> Русский
    </button>
    <button class="lang-btn" id="btn-uz" onclick="setLang('uz')" disabled>
      <span class="flag">🇺🇿</span> O'zbekcha
    </button>
  </div>
</div>

<!-- ══ SCREEN 2 — Input ══ -->
<div id="s-input" class="screen">
  <div class="appbar">
    <div class="ab-spacer"></div>
    <span class="ab-title" id="t-title"></span>
    <div class="ab-spacer"></div>
  </div>
  <div class="sc">
    <div>
      <p class="sec-label" id="t-photos-lbl"></p>
      <div class="img-grid" id="img-grid">
        <button class="add-btn" onclick="pickFiles()" id="add-cell">
          <svg viewBox="0 0 26 26" fill="none">
            <rect x="1" y="1" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.4"/>
            <path d="M3 19 L8 13 L12 17 L17 11 L23 19" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M13 5 v4 M11 7 h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span id="t-add"></span>
        </button>
      </div>
      <input type="file" id="file-in" multiple accept="image/*" style="display:none" onchange="onFiles(event)">
    </div>
    <div>
      <p class="sec-label" id="t-sym-lbl"></p>
      <textarea id="sym-in" rows="6"></textarea>
    </div>
    <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
      <span class="bi">🔬</span>
      <span id="t-analyze"></span>
    </button>
  </div>
</div>

<!-- ══ SCREEN 3 — Results ══ -->
<div id="s-result" class="screen">
  <div class="appbar">
    <button class="ab-back" onclick="nav('s-input')">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M9.5 2.5 L4.5 7.5 L9.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="ab-title" id="t-res-title"></span>
    <div class="ab-spacer"></div>
  </div>
  <div class="sc" id="res-content"></div>
</div>

<script>
/* ── Config ──────────────────────────── */
// API key is entered by the user on the language screen and stored in localStorage
let API_KEY = localStorage.getItem('plantmd_gemini_key') || '';

/* ── Translations ────────────────────── */
const T = {
  ru: {
    title:       'Диагностика растений',
    photosLbl:   'Фотографии растения',
    add:         'Добавить',
    symLbl:      'Симптомы',
    symPH:       'Коричневые пятна, увядание листьев...',
    analyze:     'Анализировать',
    resTitle:    'Результат диагностики',
    descLbl:     'Описание симптомов',
    analysisLbl: 'Результат анализа',
    photosLbl2:  'Отправленные фото',
    noPhotos:    'Добавьте хотя бы одно фото',
    loadMsg:     'Анализирую',
    prompt: (s, n) =>
      `Вы опытный агроном. Проанализируйте ${n} фото растений.` +
      (s ? `\nОписание симптомов: "${s}"` : '') +
      `\n\nСформируйте ответ по структуре:\n- Основной диагноз (с вероятностью %)\n- Альтернативные диагнозы (при наличии)\n- Краткое описание заболевания\n- Методы лечения (пошагово)\n- Меры профилактики\n- Предупреждения\n\nОтвет должен быть чётким и структурированным.`,
  },
  uz: {
    title:       'Oʻsimlik Diagnostikasi',
    photosLbl:   'Oʻsimlik rasmlari',
    add:         'Qoʻshish',
    symLbl:      'Alomatlar',
    symPH:       'Barglarda dogʻlar, soʻlish...',
    analyze:     'Tahlil qilish',
    resTitle:    'Tashxis natijalari',
    descLbl:     'Tavsif',
    analysisLbl: 'Tahlil natijasi',
    photosLbl2:  'Yuborilgan rasmlar',
    noPhotos:    'Kamida bitta rasm qoʻshing',
    loadMsg:     'Tahlil qilyapman',
    prompt: (s, n) =>
      `Siz tajribali agronomsiz. ${n} ta oʻsimlik rasmini tahlil qiling.` +
      (s ? `\nFoydalanuvchi tavsifi: "${s}"` : '') +
      `\n\nQuyidagi strukturada javob bering:\n- Asosiy tashxis (ehtimollik %)\n- Qoʻshimcha tashxislar (mavjud boʻlsa)\n- Kasallik haqida maʼlumot\n- Davolash usullari (bosqichma-bosqich)\n- Oldini olish choralari\n- Ogohlantirishlar\n\nJavob aniq va tushunarli boʻlsin.`,
  },
};

/* ── State ───────────────────────────── */
let lang   = 'ru';
let images = []; // { dataUrl }

/* ── Background ──────────────────────── */
(function initBg() {
  const cv = document.getElementById('bg-canvas');
  const cx = cv.getContext('2d');
  let W, H, pts = [];

  const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
  window.addEventListener('resize', resize);
  resize();

  const mk = () => ({
    x: Math.random() * W, y: H + 16,
    r: 5 + Math.random() * 11,
    vy: .25 + Math.random() * .45,
    vx: (Math.random() - .5) * .35,
    a: Math.PI * 2 * Math.random(),
    va: (Math.random() - .5) * .013,
    op: .03 + Math.random() * .07,
  });

  for (let i = 0; i < 22; i++) { const p = mk(); p.y = Math.random() * H; pts.push(p); }

  const leaf = (x, y, r, a, op) => {
    cx.save(); cx.translate(x, y); cx.rotate(a);
    cx.globalAlpha = op; cx.beginPath();
    cx.moveTo(0, -r);
    cx.bezierCurveTo( r*.8, -r*.55,  r*.8, r*.55, 0,  r);
    cx.bezierCurveTo(-r*.8,  r*.55, -r*.8, -r*.55, 0, -r);
    cx.fillStyle = '#4ade80'; cx.fill(); cx.restore();
  };

  const tick = () => {
    cx.clearRect(0, 0, W, H);
    pts.forEach((p, i) => {
      p.y -= p.vy; p.x += p.vx; p.a += p.va;
      leaf(p.x, p.y, p.r, p.a, p.op);
      if (p.y < -20) pts[i] = mk();
    });
    requestAnimationFrame(tick);
  };
  tick();
})();

/* ── Navigation ──────────────────────── */
function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active', 'leaving'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop = 0;
}

/* ── API Key input ───────────────────── */
function onKeyInput(val) {
  const ok = val.trim().startsWith('AIza');
  _id('btn-ru').disabled = !ok;
  _id('btn-uz').disabled = !ok;
}

// Restore saved key on load
window.addEventListener('DOMContentLoaded', () => {
  if (API_KEY) {
    _id('key-in').value = API_KEY;
    onKeyInput(API_KEY);
  }
});

/* ── Language ────────────────────────── */
function setLang(l) {
  API_KEY = _id('key-in').value.trim();
  localStorage.setItem('plantmd_gemini_key', API_KEY);
  lang = l;
  const t = T[l];
  _id('t-title').textContent       = t.title;
  _id('t-photos-lbl').textContent  = t.photosLbl;
  _id('t-add').textContent         = t.add;
  _id('t-sym-lbl').textContent     = t.symLbl;
  _id('sym-in').placeholder        = t.symPH;
  _id('t-analyze').textContent     = t.analyze;
  _id('t-res-title').textContent   = t.resTitle;
  _id('load-msg').textContent      = t.loadMsg;
  nav('s-input');
}

/* ── Images ──────────────────────────── */
function pickFiles() { _id('file-in').click(); }

function onFiles(e) {
  [...e.target.files].forEach(f => {
    const r = new FileReader();
    r.onload = ev => { images.push(ev.target.result); renderGrid(); };
    r.readAsDataURL(f);
  });
  e.target.value = '';
}

function delImg(i) { images.splice(i, 1); renderGrid(); }

function renderGrid() {
  const g = _id('img-grid');
  const t = T[lang];
  g.innerHTML = '';

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn'; addBtn.onclick = pickFiles;
  addBtn.innerHTML = `
    <svg viewBox="0 0 26 26" fill="none" width="26" height="26">
      <rect x="1" y="1" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.4"/>
      <path d="M3 19 L8 13 L12 17 L17 11 L23 19" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M13 5 v4 M11 7 h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span>${t.add}</span>`;
  g.appendChild(addBtn);

  images.forEach((src, i) => {
    const cell = document.createElement('div');
    cell.className = 'img-cell';
    cell.innerHTML = `<img src="${src}" alt=""><button class="img-del" onclick="delImg(${i})">✕</button>`;
    g.appendChild(cell);
  });
}

/* ── Snackbar ────────────────────────── */
function snack(msg) {
  const el = _id('snack');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

/* ── Analyze ─────────────────────────── */
async function analyze() {
  if (!images.length) { snack(T[lang].noPhotos); return; }
  const t = T[lang];
  const symptoms = _id('sym-in').value.trim();

  _id('loading').classList.add('on');
  _id('analyze-btn').disabled = true;

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

    const parts = [
      { text: t.prompt(symptoms, images.length) },
      ...images.map(dataUrl => ({
        inline_data: {
          mime_type: dataUrl.split(';')[0].split(':')[1],
          data: dataUrl.split(',')[1],
        },
      })),
    ];

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: { maxOutputTokens: 2000 },
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    let text = data.candidates[0].content.parts[0].text
      .replace(/\*\*/g, '').replace(/\*/g, '')
      .replace(/^#{1,3} ?/gm, '').replace(/__/g, '').trim();

    renderResults(symptoms, text);
  } catch (err) {
    snack(`${lang === 'uz' ? 'Xato' : 'Ошибка'}: ${err.message}`);
  } finally {
    _id('loading').classList.remove('on');
    _id('analyze-btn').disabled = false;
  }
}

function renderResults(symptoms, analysis) {
  const t   = T[lang];
  const box = _id('res-content');
  box.innerHTML = '';

  if (symptoms) box.appendChild(card(t.descLbl, h(symptoms)));

  box.appendChild(card(t.analysisLbl, h(analysis)));

  if (images.length) {
    const imgs = document.createElement('div');
    imgs.className = 'r-imgs';
    imgs.innerHTML = images.map(s => `<img src="${s}" alt="">`).join('');
    box.appendChild(card(t.photosLbl2, '', imgs));
  }

  const sp = document.createElement('div');
  sp.style.height = '24px';
  box.appendChild(sp);

  nav('s-result');
}

function card(label, textHtml, extra) {
  const d = document.createElement('div');
  d.className = 'r-card';
  d.innerHTML = `<div class="r-label">${label}</div>${textHtml ? `<p class="r-text">${textHtml}</p>` : ''}`;
  if (extra) d.appendChild(extra);
  return d;
}

/* ── Helpers ─────────────────────────── */
function _id(id) { return document.getElementById(id); }
function h(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
</script>
